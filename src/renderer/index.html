<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Recorder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    .timer {
      font-family: 'Courier New', monospace;
      font-size: 22px;
      font-weight: bold;
      color: #53d769;
      letter-spacing: 2px;
      min-width: 100px;
      text-align: center;
    }

    .timer.recording { color: #e94560; animation: pulse 1s infinite; }
    .timer.paused { color: #f5a623; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-idle { background: #2d3748; color: #a0aec0; }
    .status-recording { background: #e945601a; color: #e94560; border: 1px solid #e94560; }
    .status-paused { background: #f5a6231a; color: #f5a623; border: 1px solid #f5a623; }

    .preview-container {
      flex: 1;
      min-height: 0; /* kunci: biarkan flex shrink, jangan overflow */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      background: #0f0f23;
      position: relative;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      background: #000;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #4a5568;
    }

    .placeholder svg { opacity: 0.3; }

    .settings-panel {
      flex-shrink: 0; /* jangan pernah terpotong */
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .setting-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .setting-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #718096;
      font-weight: 600;
    }

    select {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #e94560; }
    select:hover { border-color: #533483; }

    .controls {
      flex-shrink: 0; /* selalu tampil, tidak terpotong */
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-record {
      background: #e94560;
      color: white;
    }

    .btn-record:hover:not(:disabled) { background: #d63851; transform: scale(1.02); }

    .btn-pause {
      background: #f5a623;
      color: #1a1a2e;
    }

    .btn-pause:hover:not(:disabled) { background: #e09515; transform: scale(1.02); }

    .btn-stop {
      background: #4a5568;
      color: white;
    }

    .btn-stop:hover:not(:disabled) { background: #5a6578; transform: scale(1.02); }

    .shortcuts-hint {
      flex-shrink: 0;
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: #4a5568;
      background: #12121f;
    }

    .shortcuts-hint kbd {
      background: #2d3748;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
      border: 1px solid #4a5568;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⏺ Screen Recorder</h1>
    <div class="timer" id="timer">00:00:00</div>
    <span class="status-badge status-idle" id="statusBadge">IDLE</span>
  </div>

  <div class="preview-container">
    <video id="videoPreview" autoplay muted style="display:none;"></video>
    <div class="placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <p>Select a screen source and start recording</p>
    </div>
  </div>

  <div class="settings-panel">
    <div class="settings-row">
      <div class="setting-group">
        <label>Screen Source</label>
        <select id="sourceSelect">
          <option value="">Select screen or window...</option>
        </select>
      </div>
      <div class="setting-group">
        <label>Microphone</label>
        <select id="micSelect">
          <option value="">No microphone</option>
        </select>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-record" id="startBtn">⏺ Start Recording</button>
    <button class="btn-pause" id="pauseBtn" disabled>⏸ Pause</button>
    <button class="btn-stop" id="stopBtn" disabled>⏹ Stop</button>
  </div>

  <div class="shortcuts-hint">
    <kbd>Ctrl+Shift+R</kbd> Toggle Recording &nbsp;&nbsp;
    <kbd>Ctrl+Shift+P</kbd> Toggle Pause
  </div>

  <script src="./index.js"></script>
</body>
</html>
