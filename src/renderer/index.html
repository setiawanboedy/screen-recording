<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Recorder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    .timer {
      font-family: 'Courier New', monospace;
      font-size: 22px;
      font-weight: bold;
      color: #53d769;
      letter-spacing: 2px;
      min-width: 100px;
      text-align: center;
    }

    .timer.recording { color: #e94560; animation: pulse 1s infinite; }
    .timer.paused { color: #f5a623; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-idle { background: #2d3748; color: #a0aec0; }
    .status-recording { background: #e945601a; color: #e94560; border: 1px solid #e94560; }
    .status-paused { background: #f5a6231a; color: #f5a623; border: 1px solid #f5a623; }

    .preview-container {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      background: #0f0f23;
      position: relative;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 6px;
      background: #000;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #4a5568;
    }

    .placeholder svg { opacity: 0.3; }

    .settings-panel {
      flex-shrink: 0; /* jangan pernah terpotong */
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .setting-group {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .setting-group select {
      width: 100%;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .setting-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #718096;
      font-weight: 600;
    }

    select {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #e94560; }
    select:hover { border-color: #533483; }

    .controls {
      flex-shrink: 0; /* selalu tampil, tidak terpotong */
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-record {
      background: #e94560;
      color: white;
    }

    .btn-record:hover:not(:disabled) { background: #d63851; transform: scale(1.02); }

    .btn-pause {
      background: #f5a623;
      color: #1a1a2e;
    }

    .btn-pause:hover:not(:disabled) { background: #e09515; transform: scale(1.02); }

    .btn-stop {
      background: #4a5568;
      color: white;
    }

    .btn-stop:hover:not(:disabled) { background: #5a6578; transform: scale(1.02); }

    .shortcuts-hint {
      flex-shrink: 0;
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: #4a5568;
      background: #12121f;
    }

    .shortcuts-hint kbd {
      background: #2d3748;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
      border: 1px solid #4a5568;
    }

    /* ── Noise Reduction Toggle ─────────────────────────── */
    .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toggle-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #718096;
      font-weight: 600;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
    }

    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #2d3748;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #4a5568;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #718096;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #45e97c1a;
      border-color: #45e97c;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #45e97c;
    }

    .toggle-switch input:disabled + .toggle-slider {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .toggle-text {
      font-size: 12px;
      color: #a0aec0;
      white-space: nowrap;
    }

    .toggle-text.active {
      color: #45e97c;
    }

    /* ── Refresh Button ─────────────────────────────────── */
    .btn-refresh {
      background: none;
      border: 1px solid #0f3460;
      color: #718096;
      padding: 0 8px;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      height: 34px;
      transition: all 0.2s;
      align-self: flex-end;
      flex-shrink: 0;
    }

    .btn-refresh:hover:not(:disabled) {
      border-color: #533483;
      color: #e0e0e0;
      transform: none;
    }

    .btn-refresh:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-refresh.spinning { animation: spin 0.6s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Device hint ─────────────────────────────────────── */
    .device-hint {
      font-size: 10px;
      color: #4a5568;
      margin-top: 2px;
      line-height: 1.4;
    }

    .device-hint.warn { color: #f5a623; }

    /* ── Mic Level Meter ────────────────────────────────── */
    .mic-meter-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mic-meter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
    }

    .mic-icon {
      font-size: 16px;
      flex-shrink: 0;
      transition: filter 0.15s;
      line-height: 1;
    }

    .mic-icon.active {
      filter: drop-shadow(0 0 5px #53d769);
    }

    .mic-icon.loud {
      filter: drop-shadow(0 0 7px #f5a623);
    }

    .mic-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 22px;
    }

    .mic-bar {
      width: 4px;
      border-radius: 2px;
      background: #2d3748;
      transition: height 0.08s ease, background 0.08s ease;
      min-height: 3px;
    }

    .mic-meter-label {
      font-size: 11px;
      color: #4a5568;
      white-space: nowrap;
      min-width: 60px;
    }

    .mic-meter-label.testing { color: #53d769; }
    .mic-meter-label.loud    { color: #f5a623; }
    .mic-meter-label.clip    { color: #e94560; }

    /* ── Conversion Overlay ─────────────────────────────── */
    .conversion-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 25, 0.82);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .conversion-overlay.visible { display: flex; }

    .conversion-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 28px 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .conversion-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .conversion-icon { font-size: 28px; line-height: 1; }

    .conversion-title {
      font-size: 15px;
      font-weight: 700;
      color: #e0e0e0;
    }

    .conversion-sub {
      font-size: 12px;
      color: #718096;
      margin-top: 3px;
    }

    .progress-track {
      height: 8px;
      background: #1a1a2e;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e94560, #533483);
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .progress-fill.indeterminate {
      width: 35%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #718096;
    }

    #progressPercent { font-weight: 700; color: #e94560; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⏺ Screen Recorder</h1>
    <div class="timer" id="timer">00:00:00</div>
    <span class="status-badge status-idle" id="statusBadge">IDLE</span>
  </div>

  <div class="preview-container">
    <video id="videoPreview" autoplay muted style="display:none;"></video>
    <div class="placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <p>Select a screen source and start recording</p>
    </div>
  </div>

  <div class="settings-panel">
    <div class="settings-row">
      <div class="setting-group" style="flex: 2;">
        <label>Screen Source</label>
        <select id="sourceSelect">
          <option value="">Select screen or window...</option>
        </select>
      </div>
      <div class="setting-group" style="flex: 2;">
        <label>Microphone</label>
        <div style="display:flex; gap:6px; align-items:flex-end;">
          <select id="micSelect" style="flex:1; min-width:0;">
            <option value="">No microphone</option>
          </select>
          <button class="btn-refresh" id="refreshMicBtn" title="Refresh device list">↺</button>
        </div>
        <div class="device-hint" id="micHint" hidden></div>
      </div>
      <div class="setting-group" style="flex: 1;">
        <label>Format</label>
        <select id="formatSelect">
          <option value="webm" selected>WebM</option>
          <option value="mp4">MP4</option>
        </select>
      </div>
    </div>
    <div class="settings-row">
      <div class="toggle-group">
        <span class="toggle-label">System Audio</span>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="systemAudioToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-text active" id="systemAudioLabel">ON — Record desktop audio</span>
        </div>
      </div>

      <div class="toggle-group" style="margin-left: 20px;">
        <span class="toggle-label">Noise Reduction</span>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="noiseReductionToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-text active" id="noiseReductionLabel">ON — Background noise reduction active</span>
        </div>
      </div>

      <div class="mic-meter-wrap" style="margin-left: auto;">
        <span class="toggle-label">Mic Level</span>
        <div class="mic-meter-row">
          <span class="mic-icon" id="micIcon">🎙️</span>
          <div class="mic-bars" id="micBars">
            <div class="mic-bar" id="micBar0"></div>
            <div class="mic-bar" id="micBar1"></div>
            <div class="mic-bar" id="micBar2"></div>
            <div class="mic-bar" id="micBar3"></div>
            <div class="mic-bar" id="micBar4"></div>
            <div class="mic-bar" id="micBar5"></div>
            <div class="mic-bar" id="micBar6"></div>
            <div class="mic-bar" id="micBar7"></div>
            <div class="mic-bar" id="micBar8"></div>
            <div class="mic-bar" id="micBar9"></div>
            <div class="mic-bar" id="micBar10"></div>
            <div class="mic-bar" id="micBar11"></div>
          </div>
          <span class="mic-meter-label" id="micMeterLabel">No mic</span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-record" id="startBtn">⏺ Start Recording</button>
    <button class="btn-pause" id="pauseBtn" disabled>⏸ Pause</button>
    <button class="btn-stop" id="stopBtn" disabled>⏹ Stop</button>
  </div>

  <div class="shortcuts-hint">
    <kbd>Ctrl+Shift+R</kbd> Toggle Recording &nbsp;&nbsp;
    <kbd>Ctrl+Shift+P</kbd> Toggle Pause
  </div>

  <!-- Conversion Progress Overlay -->
  <div id="conversionOverlay" class="conversion-overlay">
    <div class="conversion-card">
      <div class="conversion-header">
        <span class="conversion-icon" id="convIcon">🎬</span>
        <div>
          <div class="conversion-title" id="convTitle">Converting to MP4</div>
          <div class="conversion-sub" id="convSub">Please wait…</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-stats">
        <span id="progressPercent">0%</span>
        <span id="progressTime">—</span>
      </div>
    </div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
