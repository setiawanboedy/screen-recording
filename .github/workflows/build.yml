name: CI Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify dist output
        run: |
          echo "=== Build output ==="
          find dist -type f
          echo "=== Checking required files ==="
          test -f dist/main/index.js     && echo "✅ main/index.js"
          test -f dist/preload/index.cjs && echo "✅ preload/index.cjs"
          test -f dist/renderer/index.js  && echo "✅ renderer/index.js"
          test -f dist/renderer/index.html && echo "✅ renderer/index.html"
